name: YouTube Upload

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-api-python-client
          pip install google-auth
          pip install google-auth-oauthlib
          pip install pydrive

      # ✅ FIXED: create JSON files correctly
      - name: Create credential files (bulletproof)
        run: |
          echo "${{ secrets.TOKEN_JSON }}" | jq . > token.json
          echo "${{ secrets.CLIENT_SECRET_JSON }}" | jq . > client_secret.json

      # 🔍 DEBUG (remove after success)
      - name: Debug token.json size
        run: |
          echo "TOKEN SIZE:"
          wc -c token.json

      - name: Debug client_secret.json size
        run: |
          echo "CLIENT SECRET SIZE:"
          wc -c client_secret.json

      - name: Run upload script
        run: python upload_drive.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
