name: Upload YouTube Video

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # Create token.json from GitHub secret
      - name: Create token.json
        run: |
          echo '${{ secrets.YT_TOKEN_JSON }}' > token.json

      # Create client_secret.json from GitHub secret
      - name: Create client_secret.json
        run: |
          echo '${{ secrets.YT_CLIENT_SECRET_JSON }}' > client_secret.json

      # Install required Python packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2 PyDrive

      # Run the upload script
      - name: Run upload script
        run: python upload_drive.py
