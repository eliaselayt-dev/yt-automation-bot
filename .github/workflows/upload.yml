name: Upload Video to YouTube

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials using Python (avoids shell escaping issues)
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
        run: |
          python3 -c "
          import os, json

          token = os.environ['TOKEN_JSON'].strip()
          client = os.environ['CLIENT_SECRET_JSON'].strip()

          # Validate JSON before writing
          try:
              json.loads(token)
          except Exception as e:
              print('TOKEN_JSON is not valid JSON:', e)
              exit(1)

          with open('token.json', 'w') as f:
              f.write(token)

          with open('client_secret.json', 'w') as f:
              f.write(client)

          print('token.json:', len(token), 'chars')
          print('client_secret.json:', len(client), 'chars')
          print('Credentials written successfully')
          "

      - name: Run upload script
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python upload_drive.py
