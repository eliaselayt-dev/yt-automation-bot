name: Upload YouTube Video

on:
  push:
    branches: [ main ]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Create credentials files
        run: |
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Install dependencies
        run: pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client PyDrive

      - name: Run uploader
        run: python upload_drive.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
