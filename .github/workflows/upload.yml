name: Upload YouTube Video

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # ✅ SAFELY CREATE token.json
      - name: Create token.json
        run: |
          cat <<EOF > token.json
          ${{ secrets.YT_TOKEN_JSON }}
          EOF

      # ✅ SAFELY CREATE client_secret.json
      - name: Create client_secret.json
        run: |
          cat <<EOF > client_secret.json
          ${{ secrets.YT_CLIENT_SECRET_JSON }}
          EOF

      # ✅ INSTALL DEPENDENCIES
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2 PyDrive

      # ✅ DEBUG (IMPORTANT)
      - name: Debug files
        run: |
          echo "---- token.json ----"
          cat token.json
          echo "---- client_secret.json ----"
          cat client_secret.json

      # ✅ RUN SCRIPT
      - name: Run script
        run: python upload_drive.py
