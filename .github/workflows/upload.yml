name: Upload Video to YouTube

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        env:
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
        run: |
          python3 << 'PYEOF'
          import os, json

          token = os.environ.get('TOKEN_JSON', '').strip()
          client = os.environ.get('CLIENT_SECRET_JSON', '').strip()

          if not token:
              print("ERROR: TOKEN_JSON secret is empty!")
              exit(1)

          try:
              json.loads(token)
          except Exception as e:
              print(f"ERROR: TOKEN_JSON is not valid JSON: {e}")
              print(f"First 100 chars: {token[:100]}")
              exit(1)

          with open('token.json', 'w') as f:
              f.write(token)
          with open('client_secret.json', 'w') as f:
              f.write(client)

          print(f"token.json written: {len(token)} chars")
          print(f"client_secret.json written: {len(client)} chars")
          PYEOF

      - name: Run upload script
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python upload_drive.py
