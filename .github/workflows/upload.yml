name: Upload YouTube Video

on:
  push:
    branches:
      - main  # or your default branch
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    env:
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client PyDrive

      - name: Debug - Show Python version
        run: python --version

      - name: Create token.json
        run: echo '${{ secrets.YT_TOKEN_JSON }}' > token.json

      - name: Create client_secret.json
        run: echo '${{ secrets.YT_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: List Files (Debug)
        run: ls -la

      - name: Run upload script
        run: python upload_drive.py
        env:
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
